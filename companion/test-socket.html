<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OnTime Companion Socket Test</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 16px; }
    #state pre { background: #f5f5f5; padding: 8px; border-radius: 4px; }
    #log div { font-family: monospace; }
  </style>
</head>
<body>
  <h1>Companion Test - Room State</h1>
  <div style="margin-bottom: 12px;">
    <label>PIN:
      <input id="pin-input" type="text" placeholder="Enter 6-digit PIN" />
    </label>
    <button onclick="joinRoom()">Join</button>
    <span id="status"></span>
  </div>
  <button onclick="startTimer()">START Timer</button>
  <button onclick="pauseTimer()">PAUSE Timer</button>
  <button onclick="resetTimer()">RESET Timer</button>
  <div id="state" style="margin-top: 12px;"></div>
  <div id="log" style="margin-top: 12px;"></div>
  <script>
    const ROOM_ID = 'test-room';
    let socket;
    let currentState = {};

    function joinRoom() {
      const pin = document.getElementById('pin-input').value.trim();
      if (!pin) {
        log('⚠️ Enter PIN first');
        return;
      }

      if (!socket) {
        socket = io('http://localhost:4000', { transports: ['websocket'] });
        wireSocket(socket);
      }

      socket.emit('JOIN_ROOM', {
        type: 'JOIN_ROOM',
        roomId: ROOM_ID,
        token: pin,
        clientType: 'controller'
      });
      log(`➡️ Sent JOIN_ROOM with PIN ${pin}`);
    }

    function wireSocket(sock) {
      sock.on('HANDSHAKE_ACK', (data) => {
        log('✅ Connected: ' + JSON.stringify(data));
        setStatus('Connected');
      });

      sock.on('HANDSHAKE_ERROR', (data) => {
        log('❌ Error: ' + JSON.stringify(data));
        setStatus('Error');
      });

      sock.on('ROOM_STATE_SNAPSHOT', (data) => {
        currentState = data.state;
        log('📸 Snapshot: ' + JSON.stringify(data));
        updateDisplay(currentState);
      });

      sock.on('ROOM_STATE_DELTA', (data) => {
        currentState = { ...currentState, ...data.changes };
        log('🔄 Delta: ' + JSON.stringify(data));
        updateDisplay(currentState);
      });

      sock.on('disconnect', (reason) => {
        log('🔌 Disconnected: ' + reason);
        setStatus('Disconnected');
      });
    }

    function updateDisplay(state) {
      document.getElementById('state').innerHTML =
        '<pre>' + JSON.stringify(state, null, 2) + '</pre>';
    }

    function startTimer() {
      sendTimerAction('START');
    }

    function pauseTimer() {
      sendTimerAction('PAUSE');
    }

    function resetTimer() {
      sendTimerAction('RESET');
    }

    function sendTimerAction(action) {
      if (!socket) {
        log('⚠️ Join a room first.');
        return;
      }
      socket.emit('TIMER_ACTION', {
        type: 'TIMER_ACTION',
        action,
        roomId: ROOM_ID,
        timerId: 'timer-1',
        timestamp: Date.now()
      });
      log(`➡️ Sent TIMER_ACTION ${action}`);
    }

    function log(message) {
      console.log(message);
      const el = document.getElementById('log');
      el.innerHTML += '<div>' + message + '</div>';
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    // Allow Enter to join.
    document.getElementById('pin-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        joinRoom();
      }
    });
  </script>
</body>
</html>
