name: Build Controller installers

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'draft'
          - 'release'
  push:
    paths:
      - "controller/**"
      - "frontend/**"
      - ".github/workflows/controller-build.yml"
    branches:
      - main

env:
  # Set to 'true' to enable code signing when secrets are configured
  ENABLE_SIGNING: 'false'

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: VITE_APP_BASE=./ npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build-controller:
    name: Build Controller (${{ matrix.os }})
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: controller/package-lock.json

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install controller deps
        working-directory: controller
        run: npm ci

      - name: Build TypeScript
        working-directory: controller
        run: npm run build

      # macOS code signing (when enabled)
      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.ENABLE_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # Build installers (unsigned for macOS/Windows when signing disabled)
      - name: Build installers (unsigned)
        if: env.ENABLE_SIGNING != 'true' && runner.os != 'Linux'
        working-directory: controller
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --publish never

      - name: Build installers (signed - macOS)
        if: runner.os == 'macOS' && env.ENABLE_SIGNING == 'true'
        working-directory: controller
        env:
          CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --publish never

      - name: Build installers (signed - Windows)
        if: runner.os == 'Windows' && env.ENABLE_SIGNING == 'true'
        working-directory: controller
        env:
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PWD }}
        run: npx electron-builder --publish never

      # Linux doesn't need code signing, always build
      - name: Build installers (Linux)
        if: runner.os == 'Linux'
        working-directory: controller
        run: npx electron-builder --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: controller-${{ matrix.os }}
          path: |
            controller/dist_out/*.dmg
            controller/dist_out/*.zip
            controller/dist_out/*.exe
            controller/dist_out/*.AppImage
            controller/dist_out/*.blockmap
            controller/dist_out/latest*.yml

  # Optional: Publish to GitHub Releases
  publish:
    name: Publish Release
    needs: build-controller
    runs-on: ubuntu-latest
    if: github.event.inputs.publish != 'false' && github.event.inputs.publish != ''
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: ${{ github.event.inputs.publish == 'draft' }}
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/controller-*/*.dmg
            artifacts/controller-*/*.zip
            artifacts/controller-*/*.exe
            artifacts/controller-*/*.AppImage
            artifacts/controller-*/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
