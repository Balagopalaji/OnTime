name: Rebuild guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  guardrails:
    name: Guardrail checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild boundary and pattern checks
        run: npm run guardrails

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Diff whitespace check
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Commit whitespace check
        run: git show --check HEAD
