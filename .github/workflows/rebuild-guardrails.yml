name: Rebuild guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  guardrails:
    name: Guardrail checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Fast-lane eligibility
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'fast-lane')
        run: FAST_LANE_BASE=origin/${{ github.base_ref }} node scripts/check-fast-lane.mjs

      - name: Rebuild boundary and pattern checks
        run: npm run guardrails

      - name: Companion typecheck
        working-directory: companion
        run: npx tsc -p tsconfig.json --noEmit

      - name: Companion tests
        working-directory: companion
        run: npm test

      - name: Frontend lint
        run: npm run lint --workspace frontend

      - name: Frontend typecheck
        run: npm run typecheck --workspace frontend

      - name: Timer-core typecheck
        run: npm run typecheck --workspace @ontime/timer-core

      - name: Timer-core tests
        run: npx vitest --run --root . packages/timer-core/src/index.test.ts frontend/src/utils/timer-utils.test.ts

      - name: Shared-types typecheck
        run: npm run typecheck --workspace @ontime/shared-types

      - name: Local-sync arbitration typecheck
        run: npm run typecheck --workspace @ontime/local-sync-arbitration

      - name: Local-sync arbitration tests
        run: npx vitest --run --root . packages/local-sync-arbitration/src/index.test.ts frontend/src/lib/arbitration.test.ts frontend/src/lib/arbitration.mode-bias.test.ts

      # Fable audit F1: every populated §3 package must have typecheck + test
      # coverage in CI. The three blocks below close the gap left by the U1/U2/U6
      # package seeds (#65/#67/#69/#70/#71). Each runs the package's own scripts
      # so the package.json `test`/`typecheck` contracts are the source of truth.
      - name: Interface-contracts typecheck
        run: npm run typecheck --workspace @ontime/interface-contracts

      - name: Interface-contracts tests
        run: npm run test --workspace @ontime/interface-contracts

      - name: Lock-view-model typecheck
        run: npm run typecheck --workspace @ontime/lock-view-model

      - name: Lock-view-model tests
        run: npm run test --workspace @ontime/lock-view-model

      - name: Presentation-core typecheck
        run: npm run typecheck --workspace @ontime/presentation-core

      - name: Presentation-core tests
        run: npm run test --workspace @ontime/presentation-core

      # Stage 1b safety net: run the FULL frontend suite (including the UnifiedDataContext
      # characterization harness, 51 tests) so any carve-out that changes behavior turns this
      # required check red.
      - name: Frontend test suite (characterization safety net)
        working-directory: frontend
        run: npx vitest run

      - name: Diff whitespace check
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Commit whitespace check
        run: git show --check HEAD
