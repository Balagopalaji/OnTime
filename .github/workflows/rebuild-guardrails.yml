name: Rebuild guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  guardrails:
    name: Guardrail checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rebuild boundary and pattern checks
        run: npm run guardrails

      - name: Install companion dependencies
        working-directory: companion
        run: npm ci

      - name: Companion typecheck
        working-directory: companion
        run: npx tsc -p tsconfig.json --noEmit

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Timer-core typecheck
        working-directory: frontend
        run: npx tsc -p ../packages/timer-core/tsconfig.json --noEmit

      - name: Timer-core tests
        working-directory: frontend
        run: npx vitest --run --root .. packages/timer-core/src/index.test.ts frontend/src/utils/timer-utils.test.ts

      - name: Shared-types typecheck
        working-directory: frontend
        run: npx tsc -p ../packages/shared-types/tsconfig.json --noEmit

      - name: Local-sync arbitration typecheck
        working-directory: frontend
        run: npx tsc -p ../packages/local-sync-arbitration/tsconfig.json --noEmit

      - name: Local-sync arbitration tests
        working-directory: frontend
        run: npx vitest --run --root .. packages/local-sync-arbitration/src/index.test.ts frontend/src/lib/arbitration.test.ts frontend/src/lib/arbitration.mode-bias.test.ts

      # Stage 1b safety net: run the FULL frontend suite (including the UnifiedDataContext
      # characterization harness, 51 tests) so any carve-out that changes behavior turns this
      # required check red. Excludes 3 long-standing pre-existing failures (tracked for triage:
      # useSortableList, CuesPanel, AppModeContext) so they don't mask new regressions.
      - name: Frontend test suite (characterization safety net)
        working-directory: frontend
        run: npx vitest run --exclude '**/useSortableList.test.ts' --exclude '**/CuesPanel.test.tsx' --exclude '**/AppModeContext.test.tsx'

      - name: Diff whitespace check
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Commit whitespace check
        run: git show --check HEAD
